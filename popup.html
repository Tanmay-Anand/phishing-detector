<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 360px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0f1e;
        color: #e2e8f0;
        overflow: hidden;
      }

      .header {
        padding: 28px 20px 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: "";
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 220px;
        border-radius: 50%;
        opacity: 0.12;
        filter: blur(45px);
        pointer-events: none;
      }
      .header.safe::before {
        background: #10b981;
      }
      .header.suspicious::before {
        background: #f59e0b;
      }
      .header.dangerous::before {
        background: #ef4444;
      }

      .shield-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 76px;
        height: 76px;
        margin-bottom: 14px;
      }

      .shield-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        animation: spin 2.5s linear infinite;
      }
      .shield-ring.safe {
        border-top-color: #10b981;
        border-right-color: #10b98133;
      }
      .shield-ring.suspicious {
        border-top-color: #f59e0b;
        border-right-color: #f59e0b33;
      }
      .shield-ring.dangerous {
        border-top-color: #ef4444;
        border-right-color: #ef444433;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .shield-icon {
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .risk-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 13px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.4px;
        margin-bottom: 9px;
      }
      .risk-badge.safe {
        background: #10b98118;
        color: #10b981;
        border: 1px solid #10b98140;
      }
      .risk-badge.suspicious {
        background: #f59e0b18;
        color: #f59e0b;
        border: 1px solid #f59e0b40;
      }
      .risk-badge.dangerous {
        background: #ef444418;
        color: #ef4444;
        border: 1px solid #ef444440;
      }

      .risk-title {
        font-size: 20px;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 10px;
      }

      .domain-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 7px;
        padding: 5px 11px;
        font-size: 11.5px;
        color: #94a3b8;
        font-family: monospace;
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .domain-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #334155;
        flex-shrink: 0;
      }

      /* ── Threat bar ── */
      .score-section {
        margin: 0 16px 8px;
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 12px;
        padding: 14px 16px;
      }

      .score-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 9px;
      }

      .score-row-label {
        font-size: 12px;
        color: #94a3b8;
      }

      .score-level {
        font-size: 12px;
        font-weight: 600;
      }
      .score-level.safe {
        color: #10b981;
      }
      .score-level.suspicious {
        color: #f59e0b;
      }
      .score-level.dangerous {
        color: #ef4444;
      }

      .bar-bg {
        height: 6px;
        background: #1e293b;
        border-radius: 100px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 100px;
        transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .bar-fill.safe {
        background: linear-gradient(90deg, #059669, #10b981);
      }
      .bar-fill.suspicious {
        background: linear-gradient(90deg, #d97706, #f59e0b);
      }
      .bar-fill.dangerous {
        background: linear-gradient(90deg, #dc2626, #ef4444);
      }

      /* ── Warnings ── */
      .warnings-section {
        padding: 4px 16px 12px;
      }

      .section-title {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #64748b;
        margin-bottom: 9px;
        padding-left: 2px;
      }

      .warning-card {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 13px;
        margin-bottom: 7px;
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 10px;
        font-size: 12.5px;
        line-height: 1.5;
        color: #cbd5e1;
      }
      .warning-card.dangerous {
        border-left: 3px solid #ef4444;
      }
      .warning-card.suspicious {
        border-left: 3px solid #f59e0b;
      }

      .w-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        margin-top: 1px;
      }
      .w-icon.dangerous {
        background: #ef444422;
        color: #ef4444;
      }
      .w-icon.suspicious {
        background: #f59e0b22;
        color: #f59e0b;
      }

      /* ── Safe card ── */
      .safe-card {
        margin: 4px 16px 12px;
        padding: 22px 20px;
        background: #111827;
        border: 1px solid #10b98128;
        border-radius: 12px;
        text-align: center;
      }

      .safe-circle {
        width: 44px;
        height: 44px;
        background: #10b98118;
        border: 1px solid #10b98140;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
      }

      .check-mark {
        width: 16px;
        height: 10px;
        border-left: 2.5px solid #10b981;
        border-bottom: 2.5px solid #10b981;
        transform: rotate(-45deg) translate(1px, -2px);
      }

      .safe-heading {
        font-size: 14px;
        font-weight: 600;
        color: #10b981;
        margin-bottom: 5px;
      }

      .safe-sub {
        font-size: 12.5px;
        color: #64748b;
        line-height: 1.6;
      }

      /* ── Footer ── */
      .footer {
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        border-top: 1px solid #111827;
      }

      .pulse-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #10b981;
        animation: pulse 2s ease-in-out infinite;
      }
      .pulse-dot.suspicious {
        background: #f59e0b;
      }
      .pulse-dot.dangerous {
        background: #ef4444;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }

      .footer-text {
        font-size: 11px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="header" id="header">
      <div class="shield-wrap">
        <div class="shield-ring" id="shield-ring"></div>
        <div class="shield-icon" id="shield-icon"></div>
      </div>
      <div class="risk-badge" id="risk-badge">Scanning…</div>
      <div class="risk-title" id="risk-title">Analyzing page</div>
      <div class="domain-chip">
        <span class="domain-dot"></span>
        <span id="domain-text">—</span>
      </div>
    </div>

    <div id="content"></div>

    <div class="footer">
      <div class="pulse-dot" id="pulse-dot"></div>
      <span class="footer-text">Phishing Detector • Active</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
